<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, initial-scale=1.0, user-scalable=no" />
    <title>Montreal Fireworks Remote</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="remote-page">
    <main class="remote-layout">
      <div class="remote-panel">
        <p class="eyebrow">Télécommande</p>
        <h1>L’International des Feux</h1>
        <p>Session : <code id="remote-session-id">...</code></p>
        <div class="remote-actions remote-actions-stacked">
          <button id="btn-next" class="remote-button primary remote-button-next">Slide suivante</button>
          <button id="btn-prev" class="remote-button secondary">Slide précédente</button>
          <button id="btn-fireworks" class="remote-button fireworks">🎆 Déclencher les feux</button>
        </div>
        <div class="goto-panel-simple">
          <label>
            Numéro du slide
            <input id="goto-slide" type="number" min="1" placeholder="1" inputmode="numeric" />
          </label>
          <button id="btn-goto" class="remote-button tertiary">Aller au slide</button>
        </div>
        <p id="remote-feedback" class="remote-feedback">Connexion...</p>
      </div>
    </main>

    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <script src="app.js"></script>
  </body>
</html>
