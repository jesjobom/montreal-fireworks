<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, initial-scale=1.0, user-scalable=no" />
    <title>Montreal Fireworks Remote</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="remote-page">
    <main class="remote-layout">
      <div class="remote-panel">
        <p class="eyebrow">Remote control</p>
        <h1>Montreal Fireworks</h1>
        <p>Session: <code id="remote-session-id">...</code></p>
        <div class="remote-actions">
          <button id="btn-prev" class="remote-button secondary">Previous</button>
          <button id="btn-next" class="remote-button primary">Next</button>
        </div>
        <div class="goto-panel">
          <label>
            H
            <input id="goto-h" type="number" min="0" placeholder="0" />
          </label>
          <label>
            V
            <input id="goto-v" type="number" min="0" placeholder="0" />
          </label>
          <button id="btn-goto" class="remote-button tertiary">Go to slide</button>
        </div>
        <p id="remote-feedback" class="remote-feedback">Connecting...</p>
      </div>
    </main>

    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <script src="app.js"></script>
  </body>
</html>
